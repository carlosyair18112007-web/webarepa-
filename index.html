    <span class="player-artist">arepita</span>
  </div>
  <button class="player-btn" onclick="toggleAudio()">▶</button>
</div>

<audio id="bg-audio" loop>
  <source src="audios/audio uwu.mp3" type="audio/mpeg"/>
</audio>

  <!--
    ══════════════════════════════════════
    VIDEO DE FONDO
    · autoplay  → arranca solo
    · muted     → sin sonido (obligatorio para autoplay)
    · loop      → se repite infinitamente
    · playsinline → funciona en móvil sin pantalla completa
    El archivo debe estar en la misma carpeta que index.html
    ══════════════════════════════════════
  -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="videos/bochira.mp4" type="video/mp4"/>
  </video>

    ══════════════════════════════════════

    ══════════════════════════════════════

  <canvas id="bg-canvas"></canvas>
